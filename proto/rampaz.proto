syntax = "proto3";

package k8sinfo;

option go_package = "github.com/Mujib-Ahasan/Rampaz/proto";

import "google/protobuf/empty.proto";

service K8sInfo {
  rpc ListPods(NamespaceRequest) returns (PodListResponse);
  rpc GetNodeStats(NodeRequest) returns (NodeStatsResponse);
  rpc GetPodStats(PodRequest) returns (stream PodStatsResponse);
  rpc GetNodeRealTimeStats(NodeRequest) returns (stream NodeStatsResponse);
  rpc StreamEvents(google.protobuf.Empty) returns (stream EventResponse);
  rpc ListDeployments(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListReplicaSets(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListStatefulSets(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListDaemonSets(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListJobs(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListCronJobs(NamespaceRequest) returns (WorkloadListResponse);
  rpc ListServices(NamespaceRequest) returns (ServiceListResponse);
  rpc ListNamespaces(google.protobuf.Empty) returns (NamespaceListResponse);
  rpc ListPVCs(NamespaceRequest) returns (PVCListResponse);
  rpc ListPVs(google.protobuf.Empty) returns (PVListResponse);
  rpc ListNodes(google.protobuf.Empty) returns (NodeListResponse);
  rpc ListNetworkPolicies(NamespaceRequest) returns (NetworkPolicyListResponse);
  rpc GetNamespaceSummary(NamespaceRequest) returns (NamespaceSummaryResponse);
  rpc GetClusterOverview(google.protobuf.Empty) returns (ClusterOverviewResponse);
  rpc GetWorkloadsByHealth(WorkloadHealthRequest) returns (WorkloadListResponse);
}

message NamespaceRequest {
  string namespace = 1;
  string label_selector = 2;
}

message PodRequest {
  string namespace = 1;
}

message PodStatsResponse {
  string name = 1;
  string namespace = 2;
  string cpu = 3;
  string memory = 4;
}

message Pod {
  string name = 1;
  string namespace = 2;
  string status = 3;
  string nodeName = 4;
}

message PodListResponse {
  repeated Pod pods = 1;
}

message NodeRequest {
  string nodeName = 1;
}

message NodeStatsResponse {
  string name = 1;
  string cpu = 2;
  string memory = 3;
}

message EventResponse {
  string type = 1;
  string reason = 2;
  string message = 3;
  string involvedObject = 4;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTHY = 1;
  DEGRADED = 2;
  UNHEALTHY = 3;
}

message Workload {
  string name = 1;
  string namespace = 2;

  // Replica-related fields (not all apply to every workload)
  int32 desiredReplicas = 3;
  int32 readyReplicas = 4;
  int32 availableReplicas = 5;
  int32 updatedReplicas = 6;

  // Job-specific fields
  int32 active = 7;
  int32 succeeded = 8;
  int32 failed = 9;

  // CronJob-specific fields
  string schedule = 10;
  string lastScheduleTime = 11;

  // Metadata
  map<string, string> labels = 12;
  repeated string conditions = 13;
  string owner = 14;
  string age = 15;

  HealthStatus health = 16;
}

message WorkloadListResponse {
  repeated Workload workloads = 1;
}

message ServiceInfo {
  string name = 1;
  string namespace = 2;
  string type = 3;
  string cluster_ip = 4;
  repeated string external_ips = 5;
  repeated string ports = 6;
  string age = 7;
}

message ServiceListResponse {
  repeated ServiceInfo services = 1;
}

message NamespaceInfo {
  string name = 1;
  string phase = 2;
  string age = 3;
}

message NamespaceListResponse {
  repeated NamespaceInfo namespaces = 1;
}

message PVCInfo {
  string name = 1;
  string namespace = 2;
  string phase = 3;
  string storage_class = 4;
  repeated string access_modes = 5;
  string requested_storage = 6;
  string volume_name = 7;
  string age = 8;
}

message PVCListResponse {
  repeated PVCInfo pvcs = 1;
}

message PVInfo {
  string name = 1;
  string phase = 2;
  string storage_class = 3;
  string capacity = 4;
  repeated string access_modes = 5;
  string volume_mode = 6;
  string claim_name = 7;
  string claim_namespace = 8;
  string age = 9;
}

message PVListResponse {
  repeated PVInfo pvs = 1;
}

message NodeInfo {
  string name = 1;
  string internal_ip = 2;
  string phase = 3;
  string age = 4;
}

message NodeListResponse {
  repeated NodeInfo nodes = 1;
}

message NetworkPolicyInfo {
  string name = 1;
  string namespace = 2;
  repeated string policy_types = 3;
  string pod_selector = 4;
  string age = 5;
}

message NetworkPolicyListResponse {
  repeated NetworkPolicyInfo networkPolicies = 1;
}

message NamespaceSummaryResponse {
  string namespace = 1;

  int32 pods = 2;
  int32 deployments = 3;
  int32 replicasets = 4;
  int32 statefulsets = 5;
  int32 daemonsets = 6;
  int32 jobs = 7;
  int32 cronjobs = 8;
  int32 services = 9;
  int32 persistent_volume_claims = 10;
  int32 network_policies = 11;
}

message ClusterOverviewResponse {
  int32 nodes = 1;
  int32 namespaces = 2;

  int32 pods = 3;
  int32 deployments = 4;
  int32 replicasets = 5;
  int32 statefulsets = 6;
  int32 daemonsets = 7;
  int32 jobs = 8;
  int32 cronjobs = 9;

  int32 services = 10;
  int32 persistent_volume_claims = 11;

  int32 ingresses = 12;
  int32 secrets = 13;
  int32 configmaps = 14;
  int32 serviceaccounts = 15;

  int32 network_policies = 16;
}

message WorkloadHealthRequest {
  string namespace = 1;
  string health = 2;
}


